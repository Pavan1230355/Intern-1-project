services:
  - type: web
    name: taskflow
    runtime: python
    region: singapore          # closest to India
    plan: free
    branch: main               # matches the GitHub branch Vercel watches
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /
